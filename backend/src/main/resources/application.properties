spring.application.name=prepport-backend

spring.datasource.url=jdbc:postgresql://localhost:5432/prepport
spring.datasource.username=prepport
spring.datasource.password=prepport

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

prepport.jwt.secret=${JWT_SECRET}
prepport.jwt.expiration-ms=86400000
